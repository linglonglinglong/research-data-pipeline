services:
  # 1. The PostgreSQL Database
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - pg_data:/var/lib/postgresql/data  # This satisfies the persistence constraint!
    ports:
      - "5433:5432" # Expose on 5433 to avoid conflicts with any local Postgres instances
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hks_user -d sensor_data"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. The FastAPI Backend
  api:
    build: ./api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  # 3. The React UI
  frontend:
    build: ./frontend
    environment:
      # Tells Next.js where to send API requests
      - NEXT_PUBLIC_API_URL=/api

  # 4. The Nginx Reverse Proxy
  proxy:
    build: ./nginx
    ports:
      - "80:80" # The single entry point for all web traffic
    depends_on:
      - api
      - frontend

  # # 5. LocalStack (Mock AWS)
  # localstack:
  #   image: localstack/localstack
  #   ports:
  #     - "127.0.0.1:4566:4566"            # LocalStack Gateway
  #   environment: # cannot really mock rds, ec2, etc. in the Community version
  #     - DOCKER_HOST=unix:///var/run/docker.sock
  #   volumes:
  #     - "/var/run/docker.sock:/var/run/docker.sock"

# Defines the "backpack" for our database to keep data safe between restarts
volumes:
  pg_data: